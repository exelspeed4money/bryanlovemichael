<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Fredoka',sans-serif;
  background:#efe6d6;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:60px;
}

.container{
  width:420px;
  background:#fff;
  border:2px solid #000;
  border-radius:28px;
  padding:30px;
  box-shadow:4px 4px 0 rgba(0,0,0,0.7);
  text-align:center;
}

.title{
  font-size:30px;
  font-weight:700;
  margin-bottom:25px;
}

.vote-wrap{
  display:flex;
  gap:20px;
  justify-content:center;
}

.btn{
  width:170px;
  height:170px;
  border-radius:22px;
  border:2px solid #000;
  box-shadow:4px 4px 0 rgba(0,0,0,0.7);
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
}

.btn img{
  width:95px;
  height:95px;
  border-radius:12px;
  border:2px solid #000;
  margin-bottom:8px;
}

.btn span{
  color:white;
  font-weight:600;
}

.bryan{ background:#ff7a3d; }
.michael{ background:#36c26e; }

.result{
  margin-top:25px;
  font-size:20px;
  font-weight:600;
}

.plus{
  position:absolute;
  top:10px;
  right:10px;
  font-size:22px;
  font-weight:bold;
  color:#fff;
  animation:pop 0.8s forwards;
}

@keyframes pop{
  0%{opacity:0; transform:translateY(10px);}
  50%{opacity:1;}
  100%{opacity:0; transform:translateY(-20px);}
}
</style>
</head>

<body>

<div class="container">
  <div class="title">🔥 PILIH CUII 🔥</div>

  <div class="vote-wrap">
    <div class="btn bryan" onclick="vote('bryan', this)">
      <img src="bryan2.jpg">
      <span>BRYAN</span>
    </div>

    <div class="btn michael" onclick="vote('michael', this)">
      <img src="michael.jpg">
      <span>MICHAEL</span>
    </div>
  </div>

  <div class="result">
    Bryan: ? | Michael: ?
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, updateDoc, increment, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDs1Zs_ttlnhb1EQQoTZuqCRsbcQ4Twong",
  authDomain: "bryanormichael.firebaseapp.com",
  projectId: "bryanormichael",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const voteRef = doc(db,"votes","main");

let voted = localStorage.getItem("voted");

/* disable tombol kalau udah vote */
function disable(){
  document.querySelectorAll(".btn").forEach(b=>{
    b.style.opacity="0.5";
    b.style.pointerEvents="none";
  });
}
if(voted) disable();

/* vote */
window.vote = async function(name, el){
  if(voted){
    alert("Udah vote, jangan rakus");
    return;
  }

  // efek +1
  const plus = document.createElement("div");
  plus.className = "plus";
  plus.innerText = "+1";
  el.appendChild(plus);
  setTimeout(()=>plus.remove(),800);

  // update firebase
  try{
    await updateDoc(voteRef,{
      [name]: increment(1)
    });
  }catch(e){
    console.log("DB error, cek Firestore lu");
  }

  localStorage.setItem("voted","yes");
  voted = true;
  disable();
}
</script>

</body>
</html>
